<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Fix Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .audio-button { background: #28a745; }
        .audio-button:hover { background: #218838; }
        #log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .audio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin: 20px 0; }
        .audio-item { background: white; padding: 15px; border-radius: 5px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>
    <h1>🔊 Audio Fix Test</h1>
    <p>Testing if all audio files are accessible with the corrected paths.</p>

    <div id="results"></div>
    
    <button onclick="testAllAudioFiles()">Test All Audio Files</button>
    <button onclick="clearLog()">Clear Log</button>

    <h3>Audio Test Players:</h3>
    <div class="audio-grid" id="audioGrid"></div>

    <h3>Log:</h3>
    <div id="log"></div>

    <script>
        const audioFiles = [
            { name: 'Lasers', file: '/audio/lasers.wav' },
            { name: 'Photons', file: '/audio/photons.wav' },
            { name: 'Missiles', file: '/audio/missiles.wav' },
            { name: 'Mines', file: '/audio/mines.mp3' },
            { name: 'Explosion', file: '/audio/explosion.wav' },
            { name: 'Death', file: '/audio/death.wav' },
            { name: 'Success', file: '/audio/success.wav' },
            { name: 'Blurb', file: '/audio/blurb.mp3' },
            { name: 'Warp', file: '/audio/warp.wav' },
            { name: 'Red Alert Warp', file: '/audio/warp-redalert.wav' },
            { name: 'Engines', file: '/audio/engines.wav' },
            { name: 'Command', file: '/audio/command.wav' },
            { name: 'Command Failed', file: '/audio/command_failed.mp3' }
        ];

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showResult(message, success) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
            log(message, success ? 'success' : 'error');
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('results').innerHTML = '';
        }

        function createAudioGrid() {
            const grid = document.getElementById('audioGrid');
            grid.innerHTML = '';

            audioFiles.forEach((audioFile, index) => {
                const item = document.createElement('div');
                item.className = 'audio-item';
                item.innerHTML = `
                    <h4>${audioFile.name}</h4>
                    <button class="audio-button" onclick="playAudio('${audioFile.file}', '${audioFile.name}')">
                        ▶️ Play
                    </button>
                    <div class="test-result info" id="status-${index}">Not tested</div>
                `;
                grid.appendChild(item);
            });
        }

        function playAudio(filePath, name) {
            log(`Playing ${name}: ${filePath}`);
            try {
                const audio = new Audio(filePath);
                audio.volume = 0.3; // Lower volume for testing
                
                audio.addEventListener('loadstart', () => {
                    log(`${name}: Load started`);
                });
                
                audio.addEventListener('canplay', () => {
                    log(`${name}: Can play - audio loaded successfully`);
                });
                
                audio.addEventListener('error', (e) => {
                    log(`${name}: Error loading audio - ${e.message || 'Unknown error'}`);
                });
                
                audio.play()
                    .then(() => {
                        log(`${name}: Playing successfully`);
                    })
                    .catch(error => {
                        log(`${name}: Play failed - ${error.message}`);
                    });
                    
            } catch (error) {
                log(`${name}: Failed to create audio element - ${error.message}`);
            }
        }

        async function testAllAudioFiles() {
            log('Starting comprehensive audio file test...');
            clearLog();
            
            let passedTests = 0;
            let totalTests = audioFiles.length;

            for (let i = 0; i < audioFiles.length; i++) {
                const audioFile = audioFiles[i];
                const statusElement = document.getElementById(`status-${i}`);
                
                try {
                    log(`Testing ${audioFile.name}: ${audioFile.file}`);
                    
                    // Test 1: Check if file exists via fetch
                    const response = await fetch(audioFile.file, { method: 'HEAD' });
                    
                    if (response.ok) {
                        log(`✅ ${audioFile.name}: File accessible (${response.status})`);
                        
                        // Test 2: Try to create Audio object
                        const audio = new Audio(audioFile.file);
                        
                        // Test 3: Wait for audio to be loadable
                        await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => {
                                reject(new Error('Audio load timeout'));
                            }, 5000);
                            
                            audio.addEventListener('canplay', () => {
                                clearTimeout(timeout);
                                resolve();
                            });
                            
                            audio.addEventListener('error', (e) => {
                                clearTimeout(timeout);
                                reject(new Error(`Audio error: ${e.message}`));
                            });
                            
                            audio.load();
                        });
                        
                        statusElement.textContent = '✅ PASS';
                        statusElement.className = 'test-result success';
                        passedTests++;
                        log(`✅ ${audioFile.name}: Audio can be loaded and played`);
                        
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                } catch (error) {
                    log(`❌ ${audioFile.name}: Failed - ${error.message}`);
                    statusElement.textContent = `❌ FAIL: ${error.message}`;
                    statusElement.className = 'test-result error';
                }
            }

            // Summary
            const successRate = (passedTests / totalTests) * 100;
            log(`\n📊 Test Summary: ${passedTests}/${totalTests} files passed (${successRate.toFixed(1)}%)`);
            
            if (passedTests === totalTests) {
                showResult('🎉 All audio files are working correctly!', true);
            } else {
                showResult(`⚠️ ${totalTests - passedTests} audio files have issues`, false);
            }
        }

        // Initialize the page
        window.addEventListener('load', () => {
            createAudioGrid();
            log('Audio test page loaded. Click "Test All Audio Files" to run automated tests.');
        });
    </script>
</body>
</html>
