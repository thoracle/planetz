<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Fix Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🔧 Worker Fix Test</h1>
    <p>Testing if the meshGenerator.worker.js can be loaded correctly with the fixed path.</p>

    <div id="results"></div>
    
    <button onclick="testWorkerLoad()">Test Worker Load</button>
    <button onclick="testWorkerBasicFunction()">Test Worker Function</button>
    <button onclick="clearLog()">Clear Log</button>

    <h3>Log:</h3>
    <div id="log"></div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showResult(message, success) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
            log(message, success ? 'success' : 'error');
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('results').innerHTML = '';
        }

        function testWorkerLoad() {
            log('Testing worker load...');
            
            try {
                const worker = new Worker('/js/workers/meshGenerator.worker.js');
                
                let timeoutId = setTimeout(() => {
                    worker.terminate();
                    showResult('❌ Worker load test: Timeout - worker may not be responding', false);
                }, 5000);
                
                worker.onmessage = function(e) {
                    clearTimeout(timeoutId);
                    worker.terminate();
                    showResult('✅ Worker load test: SUCCESS - Worker loaded and can receive messages', true);
                };
                
                worker.onerror = function(error) {
                    clearTimeout(timeoutId);
                    worker.terminate();
                    showResult(`❌ Worker load test: ERROR - ${error.message}`, false);
                };
                
                // Send a simple message to test communication
                setTimeout(() => {
                    try {
                        worker.postMessage({ type: 'test' });
                        log('Test message sent to worker');
                    } catch (e) {
                        clearTimeout(timeoutId);
                        worker.terminate();
                        showResult(`❌ Worker load test: Failed to send message - ${e.message}`, false);
                    }
                }, 100);
                
            } catch (error) {
                showResult(`❌ Worker load test: Failed to create worker - ${error.message}`, false);
            }
        }

        function testWorkerBasicFunction() {
            log('Testing worker basic function...');
            
            try {
                const worker = new Worker('/js/workers/meshGenerator.worker.js');
                
                let timeoutId = setTimeout(() => {
                    worker.terminate();
                    showResult('❌ Worker function test: Timeout - worker may be hanging', false);
                }, 10000);
                
                worker.onmessage = function(e) {
                    clearTimeout(timeoutId);
                    worker.terminate();
                    
                    if (e.data && e.data.type) {
                        showResult(`✅ Worker function test: SUCCESS - Worker responded with type: ${e.data.type}`, true);
                    } else {
                        showResult('⚠️ Worker function test: Worker responded but without expected format', false);
                    }
                };
                
                worker.onerror = function(error) {
                    clearTimeout(timeoutId);
                    worker.terminate();
                    showResult(`❌ Worker function test: ERROR - ${error.message}`, false);
                };
                
                // Send a mesh generation request (simplified)
                setTimeout(() => {
                    try {
                        const testData = {
                            type: 'generateMesh',
                            data: {
                                densityField: new Float32Array(64), // 4x4x4 test field
                                size: 4,
                                distance: 10,
                                viewAngle: 0.5,
                                complexity: 1
                            }
                        };
                        
                        worker.postMessage(testData, [testData.data.densityField.buffer]);
                        log('Mesh generation test request sent');
                    } catch (e) {
                        clearTimeout(timeoutId);
                        worker.terminate();
                        showResult(`❌ Worker function test: Failed to send mesh request - ${e.message}`, false);
                    }
                }, 100);
                
            } catch (error) {
                showResult(`❌ Worker function test: Failed to create worker - ${error.message}`, false);
            }
        }

        // Auto-run basic load test on page load
        window.addEventListener('load', () => {
            log('Page loaded, running automatic worker load test...');
            setTimeout(testWorkerLoad, 500);
        });
    </script>
</body>
</html>
